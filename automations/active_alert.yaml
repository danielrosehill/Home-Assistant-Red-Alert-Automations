# Active Alert - Full Red Alert
# Triggers when Oref Alert binary sensor goes ON, meaning an active
# alert has been declared for your configured area.
# Snapshots current light states, announces via TTS, plays an alert
# audio file, and restores lights after 5 minutes.
#
# Requires:
#   - Oref Alert integration (https://github.com/amitfin/oref_alert)
#   - TTS platform (e.g., Google Translate TTS)
#   - Media player entity for announcements
#   - (Optional) Alert audio file in HA media directory
#
# Customize:
#   - Replace light entities in the snapshot list with your own
#   - Replace media_player and TTS entities with your own
#   - Replace or remove the media file playback if you don't have one
#   - Adjust the 5-minute delay before light restore as needed

alias: "Red Alert - Active Alert"
description: >-
  Full red alert for your area. Snapshots light states, announces via TTS,
  plays alert audio, and restores lights after 5 minutes.
triggers:
  - alias: "Red alert for configured area"
    entity_id: binary_sensor.oref_alert
    to: "on"
    trigger: state
conditions: []
actions:
  # Snapshot current light states so we can restore them later
  - action: scene.create
    data:
      scene_id: pre_red_alert_snapshot
      snapshot_entities:
        - light.your_living_room_lights
        - light.your_bedroom_lights
        - light.your_kitchen_lights
        # Add all light entities you want to snapshot/restore

  # TTS announcement: "Red Alert - Active Alert"
  - action: tts.speak
    data:
      cache: false
      media_player_entity_id: media_player.your_speaker
      message: "Red Alert. Active Alert. Red Alert. Active Alert. Seek shelter immediately."
    target:
      entity_id: tts.google_en_com  # Replace with your TTS entity

  # Set volume for alert audio
  - action: media_player.volume_set
    data:
      volume_level: 0.77
    target:
      entity_id: media_player.your_speaker

  # Play alert audio file (optional - remove if you don't have one)
  # Upload an alert MP3 to your Home Assistant media directory first
  - action: media_player.play_media
    data:
      media:
        media_content_id: "media-source://media_source/local/your-alert-sound.mp3"
        media_content_type: "audio/mpeg"
      announce: true
    target:
      entity_id: media_player.your_speaker

  # Wait 5 minutes then restore previous light states
  - delay:
      minutes: 5

  - action: scene.turn_on
    data: {}
    target:
      entity_id: scene.pre_red_alert_snapshot

mode: restart
