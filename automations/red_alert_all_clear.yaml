# All Clear - Alert Over
# Trigger: binary_sensor.oref_alert turns off
# Behavior: PA chime + pre-recorded audio, green RGB, no sirens, green stays 3 min, then restore
#
# CUSTOMIZE: Update all entity IDs to match your Home Assistant setup

id: oref_all_clear
alias: "All clear"
description: "Alert over. PA chime + pre-recorded audio. Green RGB lights for 3 min then restore."
triggers:
  - trigger: state
    entity_id:
      - binary_sensor.oref_alert
    to: "off"
conditions: []
actions:
  - action: scene.create
    data:
      scene_id: pre_allclear_snapshot
      # CUSTOMIZE: Add all lights you want to snapshot/restore after the alert
      snapshot_entities:
        - light.living_room
        - light.bedroom
        - light.office
        - light.kitchen
        - light.nursery
        - light.bathroom
        - light.patio_1
        - light.patio_2
        - light.indicator_1
        - light.indicator_2
  - action: media_player.media_pause
    target:
      # CUSTOMIZE: Your PA/announcement media player
      entity_id: media_player.pa_system
  - action: light.turn_on
    data:
      rgb_color: [0, 255, 0]
      brightness: 255
    target:
      # CUSTOMIZE: A group containing all your RGB-capable lights
      entity_id: light.rgb_lights_group
  - action: media_player.volume_set
    data:
      volume_level: 1.0
    target:
      # CUSTOMIZE: All your speaker entities
      entity_id:
        - media_player.speaker_1_snapcast
        - media_player.speaker_2_snapcast
        - media_player.speaker_1
        - media_player.speaker_2
        - media_player.pa_system
  - action: media_player.play_media
    data:
      media_content_id: media-source://media_source/local/audio/soundfx/pa_chime_2.mp3
      media_content_type: audio/mpeg
    target:
      entity_id: media_player.pa_system
  - delay:
      seconds: 4
  - action: media_player.play_media
    data:
      media_content_id: media-source://media_source/local/audio/pa-messages/pa_all_clear.mp3
      media_content_type: audio/mpeg
    target:
      entity_id: media_player.pa_system
  - delay:
      seconds: 6
  # TODO: Add your own MQTT publish action here if you use MQTT for alert state tracking
  - delay:
      minutes: 3
  - action: scene.turn_on
    data: {}
    target:
      entity_id: scene.pre_allclear_snapshot
mode: single
