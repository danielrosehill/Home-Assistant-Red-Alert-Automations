# All Clear
# Triggers when the Oref Alert binary sensor goes OFF, meaning
# the alert for your area is over.
# Announces the all-clear via TTS and plays an audio file.
#
# Requires:
#   - Oref Alert integration (https://github.com/amitfin/oref_alert)
#   - TTS platform (e.g., Google Translate TTS)
#   - Media player entity for announcements
#   - (Optional) All-clear audio file in HA media directory
#
# Customize:
#   - Replace media_player and TTS entities with your own
#   - Replace or remove the media file playback if you don't have one

alias: "Red Alert - All Clear"
description: >-
  The alert is over. Announces the all-clear via TTS and plays
  a reassuring audio notification.
triggers:
  - trigger: state
    entity_id:
      - binary_sensor.oref_alert
    to: "off"
conditions: []
actions:
  # Set volume for announcement
  - action: media_player.volume_set
    data:
      volume_level: 0.78
    target:
      entity_id: media_player.your_speaker

  # TTS announcement: "All Clear"
  - action: tts.speak
    data:
      cache: false
      media_player_entity_id: media_player.your_speaker
      message: "All clear. The alert is over. All clear."
    target:
      entity_id: tts.google_en_com  # Replace with your TTS entity

  # Play all-clear audio file (optional - remove if you don't have one)
  - action: media_player.play_media
    data:
      media:
        media_content_id: "media-source://media_source/local/your-all-clear-sound.mp3"
        media_content_type: "audio/mpeg"
    target:
      entity_id: media_player.your_speaker

mode: single
